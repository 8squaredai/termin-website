  <rect x="14.5" y="15" width="3" height="3" rx="1" fill="#3b6e4d"/>
  <rect x="20" y="15" width="3" height="3" rx="1" fill="#3b6e4d"/>
  <rect x="9"  y="20" width="3" height="3" rx="1" fill="#3b6e4d"/>
  <rect x="14.5" y="20" width="3" height="3" rx="1" fill="#3b6e4d"/>
